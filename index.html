<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign-Up</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="wrapper">
        <div class="container1">
            <img class="scenery" src="images/scenery.png" alt="A beautiful picture with flowers, trees and mountains">
            <img class="moon" src="images/image.png" alt="A picture of the moon">
            <div class="shade"></div>
            <h1>Dreams</h1>
        </div>

        <div class="Container2">
            <p class="intro">This is not a real online service! You know you need something
                like this in your life to help you realize your deepest dreams.
                Sign up now to get started.</p>

                <p>You know you want to.</p>

                <form action="example.com/path" method="post">
                    <p>Let's do this!</p>
                    <br>
                    <div class="field">
                        <label for="firstName">First Name</label>
                        <input type="text" name="firstName" id="firstName" placeholder="John">
                    </div>

                    <div class="field">
                        <label for="lastName">Last Name</label>
                        <input type="text" name="lastName" id="lastName" placeholder="Doe">
                    </div>

                    <br><br>

                    <div class="field">
                        <label for="userEmail">Email</label>
                        <input type="email" name="email" id="userEmail" placeholder="you@example.com">
                    </div>

                    <div class="field">
                        <label for="phoneNumber">Phone Number</label>
                        <input type="number" name="phoneNumber" id="phoneNumber" placeholder="1234567890">
                    </div>

                    <br><br>

                    <div class="field">
                        <label for="password">Password</label>
                        <input type="password" name="password" id="password">
                    </div>

                    <div class="field">
                        <label for="confirmPassword">Confirm Password</label>
                        <input type="password" name="confirmPassword" id="confirmPassword">
                    </div>
                </form>

                <button type="submit">Create Account</button>

                <p>Already have an Account? Log in</p>


        </div>
    </div>
</body>
</html>
